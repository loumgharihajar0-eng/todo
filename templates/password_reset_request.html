<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Demande de réinitialisation</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
  </head>
  <body>
    <main class="container">
      <section class="panel">
        <h2>Réinitialisation du mot de passe</h2>
        <form method="post">
          <label for="identifier">Nom d'utilisateur ou email</label>
          <input id="identifier" name="identifier" class="input" />
          <div style="margin-top:12px">
            <button class="btn primary" type="submit">Envoyer l'email de réinitialisation</button>
            <a class="btn ghost" href="{{ url_for('index') }}">Annuler</a>
          </div>
        </form>
      </section>
    </main>
  </body>
</html>
