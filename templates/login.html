<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Connexion — Aurora Tasks</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
  </head>
  <body>
    <main class="container">
      <section class="panel" style="max-width:520px;margin:80px auto;">
        <h2>Se connecter</h2>
        {% with messages = get_flashed_messages() %}
          {% if messages %}
            <div class="message">{{ messages[0] }}</div>
          {% endif %}
        {% endwith %}
        <form method="post">
          <label>Nom d'utilisateur</label>
          <input class="input" name="username" autofocus />
          <label>Mot de passe</label>
          <input class="input" name="password" type="password" />
          <div style="margin-top:12px;display:flex;gap:8px;">
            <button class="btn primary" type="submit">Se connecter</button>
            <a href="/" class="btn ghost">Annuler</a>
          </div>
          <div style="margin-top:12px;text-align:center;">
            <a href="{{ url_for('password_reset_request') }}" style="font-size:14px;color:var(--text-muted);">Mot de passe oublié ?</a>
          </div>
        </form>
      </section>
    </main>
  </body>
</html>
